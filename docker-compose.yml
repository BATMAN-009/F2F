services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-f2f}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-f2f}
      POSTGRES_DB: ${POSTGRES_DB:-f2f}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-f2f} -d ${POSTGRES_DB:-f2f}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-f2fminio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-f2fminio-secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_BUCKET: ${S3_BUCKET:-f2f-assets}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-f2fminio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-f2fminio-secret}
    volumes:
      - ./infra/minio/create-buckets.sh:/usr/local/bin/create-buckets.sh:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/create-buckets.sh"]
    restart: "no"

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://f2f:f2f@db:5432/f2f}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_BUCKET: ${S3_BUCKET:-f2f-assets}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-f2fminio}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-f2fminio-secret}
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      # Uses stdlib so no extra packages needed in the slim image.
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz', timeout=2).status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.worker
    env_file:
      - .env
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    volumes:
      - ./worker:/app
    depends_on:
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
    environment:
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8000}
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api

volumes:
  db_data:
  minio_data:
